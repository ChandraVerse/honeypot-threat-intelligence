#!/usr/bin/env bash
# =============================================================================
# iptables Firewall Rules for T-Pot Honeypot
# Exposes honeypot ports to the internet while protecting management.
#
# MANAGEMENT IP: Replace YOUR_MGMT_IP with your actual IP before running.
# Usage: sudo bash firewall-rules.conf
# =============================================================================

MGMT_IP="${MGMT_IP:-YOUR_MGMT_IP}"   # Set via env or edit directly

# Flush existing rules
iptables -F
iptables -X
iptables -Z

# ── Default policies ─────────────────────────────────────────────────────────
iptables -P INPUT   DROP
iptables -P FORWARD DROP
iptables -P OUTPUT  ACCEPT

# ── Allow loopback ───────────────────────────────────────────────────────────
iptables -A INPUT -i lo -j ACCEPT

# ── Allow established / related ──────────────────────────────────────────────
iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

# ── Management access (restricted to your IP) ────────────────────────────────
if [[ "$MGMT_IP" != "YOUR_MGMT_IP" ]]; then
  iptables -A INPUT -s "$MGMT_IP" -p tcp --dport 64295 -j ACCEPT  # SSH mgmt
  iptables -A INPUT -s "$MGMT_IP" -p tcp --dport 64297 -j ACCEPT  # T-Pot Web UI
  iptables -A INPUT -s "$MGMT_IP" -p tcp --dport 5601  -j ACCEPT  # Kibana (local tunnel)
else
  echo "[WARN] MGMT_IP not set — management ports are OPEN to all (insecure!)"
  iptables -A INPUT -p tcp --dport 64295 -j ACCEPT
  iptables -A INPUT -p tcp --dport 64297 -j ACCEPT
fi

# ── Honeypot ports (open to all) ─────────────────────────────────────────────
# SSH / Telnet (Cowrie)
iptables -A INPUT -p tcp --dport 22   -j ACCEPT
iptables -A INPUT -p tcp --dport 23   -j ACCEPT
iptables -A INPUT -p udp --dport 23   -j ACCEPT

# SMB / NetBIOS (Dionaea)
iptables -A INPUT -p tcp --dport 445  -j ACCEPT
iptables -A INPUT -p tcp --dport 139  -j ACCEPT
iptables -A INPUT -p udp --dport 137  -j ACCEPT
iptables -A INPUT -p udp --dport 138  -j ACCEPT

# HTTP / HTTPS (Glastopf / Heralding)
iptables -A INPUT -p tcp --dport 80   -j ACCEPT
iptables -A INPUT -p tcp --dport 443  -j ACCEPT
iptables -A INPUT -p tcp --dport 8080 -j ACCEPT
iptables -A INPUT -p tcp --dport 8443 -j ACCEPT

# RDP (Heralding)
iptables -A INPUT -p tcp --dport 3389 -j ACCEPT

# FTP (Dionaea / Heralding)
iptables -A INPUT -p tcp --dport 21   -j ACCEPT

# MSSQL / MySQL (Heralding)
iptables -A INPUT -p tcp --dport 1433 -j ACCEPT
iptables -A INPUT -p tcp --dport 3306 -j ACCEPT

# Android ADB (ADBHoney)
iptables -A INPUT -p tcp --dport 5555 -j ACCEPT

# ICMP (allow ping for diagnostics)
iptables -A INPUT -p icmp --icmp-type echo-request -j ACCEPT

# ── Rate-limit SSH brute force to management port ────────────────────────────
iptables -I INPUT -p tcp --dport 64295 -m state --state NEW \
  -m recent --set --name SSH_MGMT
iptables -I INPUT -p tcp --dport 64295 -m state --state NEW \
  -m recent --update --seconds 60 --hitcount 5 \
  --name SSH_MGMT -j DROP

# ── Persist rules ─────────────────────────────────────────────────────────────
apt-get install -y -qq iptables-persistent netfilter-persistent
netfilter-persistent save

echo "[OK] Firewall rules applied and persisted."
