#cloud-config
# =============================================================================
# Cloud-Init Bootstrap Configuration for T-Pot Honeypot VM
# Supported providers: AWS EC2, DigitalOcean, Hetzner Cloud, Vultr
#
# Usage:
#   AWS:          --user-data file://cloud-init.yml
#   DigitalOcean: paste in 'User Data' field when creating Droplet
#   Hetzner:      paste in 'User data' field when creating server
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - wget
  - htop
  - net-tools
  - unzip
  - python3
  - python3-pip
  - python3-venv
  - jq
  - ntp
  - fail2ban

# ── Harden SSH immediately ─────────────────────────────────────────────────
write_files:
  - path: /etc/ssh/sshd_config.d/99-honeypot-hardening.conf
    content: |
      Port 64295
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      MaxAuthTries 3
      LoginGraceTime 20
      X11Forwarding no
      AllowTcpForwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 3
      backend  = systemd

      [sshd]
      enabled = true
      port    = 64295
      logpath = %(sshd_log)s

  - path: /etc/sysctl.d/99-honeypot.conf
    content: |
      # Network hardening for honeypot host
      net.ipv4.tcp_syncookies = 1
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.all.accept_source_route = 0
      kernel.dmesg_restrict = 1

runcmd:
  # Apply sysctl settings
  - sysctl --system
  # Enable fail2ban
  - systemctl enable --now fail2ban
  # Restart SSH to apply hardening config
  - systemctl restart sshd
  # Set timezone to UTC for consistent log timestamps
  - timedatectl set-timezone UTC
  # Clone the honeypot project
  - git clone --depth 1 https://github.com/ChandraVerse/honeypot-threat-intelligence /opt/honeypot-threat-intelligence
  # Make deployment script executable
  - chmod +x /opt/honeypot-threat-intelligence/deployment/tpot-setup.sh
  # Signal completion
  - touch /var/log/cloud-init-honeypot-done

final_message: |
  ════════════════════════════════════════════
  Cloud-init bootstrap complete!
  Run the following to deploy T-Pot:
    sudo /opt/honeypot-threat-intelligence/deployment/tpot-setup.sh
  ════════════════════════════════════════════
