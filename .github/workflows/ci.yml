name: CI — Analysis Pipeline Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-validate:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r analysis/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop build on syntax errors or undefined names
          flake8 analysis/ tip-feed/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for style issues
          flake8 analysis/ tip-feed/ --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

  validate-stix-bundles:
    name: Validate STIX 2.1 Bundles
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install STIX validation dependencies
        run: |
          pip install stix2 stix2-validator jsonschema

      - name: Validate all STIX bundles
        run: |
          python - <<'EOF'
          import os, json, sys
          bundle_dir = "tip-feed/stix-bundles"
          bundles = [f for f in os.listdir(bundle_dir) if f.endswith(".json")]
          if not bundles:
              print("No STIX bundles found — skipping validation (expected on fresh clone).")
              sys.exit(0)
          errors = 0
          for fname in bundles:
              path = os.path.join(bundle_dir, fname)
              with open(path) as f:
                  data = json.load(f)
              if data.get("type") != "bundle" or "objects" not in data:
                  print(f"FAIL: {fname} — missing 'type: bundle' or 'objects' key")
                  errors += 1
              else:
                  print(f"OK:   {fname} ({len(data['objects'])} objects)")
          sys.exit(errors)
          EOF

  validate-sample-data:
    name: Validate Sample Data Files
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pandas
        run: pip install pandas

      - name: Validate sample_events.json
        run: |
          python - <<'EOF'
          import json, sys
          with open("data/sample_events.json") as f:
              events = json.load(f)
          required_fields = ["timestamp", "src_ip", "dst_port", "honeypot_service"]
          errors = 0
          for i, ev in enumerate(events[:10]):
              for field in required_fields:
                  if field not in ev:
                      print(f"Event {i}: missing field '{field}'")
                      errors += 1
          print(f"Validated {len(events)} events — {errors} field errors found.")
          sys.exit(min(errors, 1))
          EOF

      - name: Validate aggregated_stats.csv
        run: |
          python - <<'EOF'
          import pandas as pd, sys
          df = pd.read_csv("data/aggregated_stats.csv")
          print(f"CSV loaded: {len(df)} rows, {list(df.columns)}")
          if df.empty:
              print("ERROR: aggregated_stats.csv is empty")
              sys.exit(1)
          print("OK: aggregated_stats.csv is valid.")
          EOF

  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true
